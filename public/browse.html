<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Browse, search, and filter a comprehensive directory of Indian Colleges. Export college contact information, websites, and emails across districts and states.">
  <meta name="keywords" content="Indian Colleges, College API, India University Directory, College Database, Export College Data, India Education Data">
  <!-- LLM & AI Bot SEO Instructions -->
  <meta name="robots" content="index, follow">
  <meta name="googlebot" content="index, follow">
  <!-- Open Graph / Social Media -->
  <meta property="og:title" content="Indian Colleges Directory & Database">
  <meta property="og:description" content="A comprehensive directory of colleges in India. Search and export data across all states and districts.">
  <meta property="og:type" content="website">
  <title>Colleges Directory | Indian Colleges API</title>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, sans-serif;
      background: #f0f2f5;
      color: #1a1a2e;
      padding: 20px;
    }
    .container { max-width: 1400px; margin: 0 auto; }

    h1 {
      font-size: 24px;
      margin-bottom: 4px;
      color: #1a1a2e;
    }
    .subtitle {
      color: #666;
      font-size: 14px;
      margin-bottom: 20px;
    }

    .filters {
      display: flex;
      gap: 12px;
      margin-bottom: 16px;
      flex-wrap: wrap;
      background: #fff;
      padding: 16px 20px;
      border-radius: 10px;
      box-shadow: 0 1px 3px rgba(0,0,0,.08);
      align-items: end;
    }
    .filter-group {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .filter-group label {
      font-size: 12px;
      font-weight: 600;
      color: #555;
      text-transform: uppercase;
      letter-spacing: .5px;
    }
    .filter-group select, .filter-group input {
      padding: 8px 12px;
      border: 1px solid #d0d5dd;
      border-radius: 6px;
      font-size: 14px;
      background: #fff;
      min-width: 180px;
      outline: none;
      transition: border .15s;
    }
    .filter-group select:focus, .filter-group input:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 2px rgba(37,99,235,.15);
    }

    .export-group {
      display: flex;
      gap: 8px;
      margin-left: auto;
      align-items: end;
    }
    .export-btn {
      padding: 8px 18px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all .15s;
      white-space: nowrap;
    }
    .export-btn.csv {
      background: #059669;
      color: #fff;
    }
    .export-btn.csv:hover { background: #047857; }
    .export-btn.excel {
      background: #2563eb;
      color: #fff;
    }
    .export-btn.excel:hover { background: #1d4ed8; }
    .export-btn:disabled {
      opacity: .4;
      cursor: default;
    }
    .has-email-group { min-width: 0 !important; }
    .has-email-group select, .has-email-group input { min-width: 0 !important; }

    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 12px;
    }
    .result-count {
      font-size: 13px;
      color: #666;
    }
    .result-count strong { color: #1a1a2e; }

    .table-wrap {
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 1px 3px rgba(0,0,0,.08);
      overflow-x: auto;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    thead { background: #f8f9fa; }
    th {
      text-align: left;
      padding: 12px 14px;
      font-weight: 600;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: .4px;
      color: #555;
      border-bottom: 1px solid #e9ecef;
      white-space: nowrap;
      cursor: pointer;
      user-select: none;
    }
    th:hover { color: #2563eb; }
    th .sort-icon { margin-left: 4px; font-size: 11px; }
    td {
      padding: 10px 14px;
      border-bottom: 1px solid #f0f0f0;
      vertical-align: top;
    }
    tr:hover td { background: #f8faff; }
    td.name-col { font-weight: 500; min-width: 200px; }
    td.phone-col { font-family: monospace; font-size: 12px; }
    td.phone-col .item, td.email-col .item, td.prof-col .item, td.website-col .item { 
      display: block; 
      padding: 4px 0; 
      white-space: nowrap; 
      overflow: hidden; 
      text-overflow: ellipsis; 
    }
    td.phone-col .item, td.email-col .item, td.prof-col .item { cursor: pointer; }
    td.phone-col .item:hover, td.email-col .item:hover, td.prof-col .item:hover { color: #2563eb; }
    td.email-col { max-width: 220px; }
    td.website-col { max-width: 240px; }
    td.prof-col { max-width: 180px; }
    td.website-col a { color: #2563eb; text-decoration: none; }
    td.website-col a:hover { text-decoration: underline; }
    .copy-toast { position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#1a1a2e;color:#fff;padding:8px 18px;border-radius:8px;font-size:13px;z-index:999;opacity:0;transition:opacity .25s;pointer-events:none; }
    .copy-toast.show { opacity:1; }
    .empty { color: #999; font-style: italic; }

    .pagination {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 16px;
      flex-wrap: wrap;
    }
    .pagination button {
      padding: 6px 14px;
      border: 1px solid #d0d5dd;
      background: #fff;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      transition: all .15s;
    }
    .pagination button:hover:not(:disabled) { border-color: #2563eb; color: #2563eb; }
    .pagination button.active { background: #2563eb; border-color: #2563eb; color: #fff; }
    .pagination button:disabled { opacity: .4; cursor: default; }
    .page-info { font-size: 13px; color: #666; margin: 0 8px; }

    @media (max-width: 768px) {
      .filters { flex-direction: column; }
      .filter-group select, .filter-group input { min-width: 100%; }
      .export-group { margin-left: 0; width: 100%; }
      .export-btn { flex: 1; text-align: center; }
      .toolbar { flex-direction: column; align-items: start; }
      body { padding: 12px; }
    }
    
    /* Theme Toggle Button */
    .theme-toggle {
      background: none;
      border: 1px solid #d0d5dd;
      border-radius: 6px;
      padding: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #555;
      background-color: #fff;
      transition: all 0.2s;
    }
    .theme-toggle:hover { border-color: #2563eb; color: #2563eb; }

    /* Dark Mode Overrides */
    body.dark-mode { background: #121212; color: #e0e0e0; }
    body.dark-mode h1, body.dark-mode .result-count strong, body.dark-mode label { color: #e0e0e0 !important; }
    body.dark-mode .subtitle, body.dark-mode .result-count, body.dark-mode .page-info, body.dark-mode th { color: #a0a0a0; }
    body.dark-mode .filters, body.dark-mode .table-wrap, body.dark-mode .filter-group select, 
    body.dark-mode .filter-group input, body.dark-mode .pagination button, body.dark-mode .theme-toggle {
      background: #1e1e1e; border-color: #333; color: #e0e0e0;
    }
    body.dark-mode .filter-group select:focus, body.dark-mode .filter-group input:focus {
      border-color: #3b82f6; box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2);
    }
    body.dark-mode .filters, body.dark-mode .table-wrap { box-shadow: 0 1px 3px rgba(0,0,0,.3); }
    body.dark-mode thead { background: #252525; }
    body.dark-mode th { border-bottom-color: #333; }
    body.dark-mode td { border-bottom-color: #2a2a2a; }
    body.dark-mode tr:hover td { background: #2a2a2a; }
    body.dark-mode .empty { color: #666; }
    body.dark-mode .export-btn.csv { background: #059669; }
    body.dark-mode .export-btn.csv:hover { background: #047857; }
    body.dark-mode .export-btn.excel { background: #2563eb; }
    body.dark-mode .export-btn.excel:hover { background: #1d4ed8; }
    body.dark-mode .pagination button:hover:not(:disabled) { border-color: #3b82f6; color: #3b82f6; }
    body.dark-mode .pagination button.active { background: #3b82f6; border-color: #3b82f6; color: #fff; }
    body.dark-mode th:hover, body.dark-mode td.phone-col .item:hover, body.dark-mode td.email-col .item:hover, 
    body.dark-mode td.prof-col .item:hover, body.dark-mode td.website-col a, body.dark-mode .theme-toggle:hover { color: #60a5fa; }
    body.dark-mode td.website-col a:hover { color: #93c5fd; }
    body.dark-mode .copy-toast { background: #e0e0e0; color: #121212; }
  </style>
</head>
<body>
<div class="container">
  <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px;">
    <div>
      <h1>Colleges Directory</h1>
      <p class="subtitle" style="margin-bottom:0;">Browse and filter colleges across India</p>
    </div>
    <button id="theme-toggle" class="theme-toggle" onclick="toggleTheme()" title="Toggle Dark/Light Mode">
      <svg id="theme-icon-dark" style="display: none;" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
      <svg id="theme-icon-light" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
    </button>
  </div>

  <div class="filters">
    <div class="filter-group">
      <label for="state-filter">State</label>
      <select id="state-filter"></select>
    </div>
    <div class="filter-group">
      <label for="district-filter">District</label>
      <select id="district-filter"></select>
    </div>
    <div class="filter-group">
      <label for="search-input">Search College</label>
      <input id="search-input" type="text" placeholder="Type college name...">
    </div>
    <div class="filter-group has-email-group">
      <label style="opacity:0;">Filter</label>
      <label style="display:flex;align-items:center;gap:6px;font-size:13px;font-weight:500;cursor:pointer;text-transform:none;letter-spacing:0;color:#1a1a2e;white-space:nowrap;">
        <input type="checkbox" id="has-email-filter" onchange="applyFilters()" style="width:16px;height:16px;cursor:pointer;">
        Has Email
      </label>
    </div>
    <div class="export-group">
      <button class="export-btn csv" id="export-csv" onclick="exportCSV()">⬇ CSV</button>
      <button class="export-btn excel" id="export-excel" onclick="exportExcel()">⬇ Excel</button>
    </div>
  </div>

  <div class="toolbar">
    <div class="result-count" id="result-count">Showing <strong>0</strong> colleges</div>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th data-sort="name">Name <span class="sort-icon">▲</span></th>
          <th data-sort="city">City</th>
          <th data-sort="district">District</th>
          <th data-sort="pin_code">Pin</th>
          <th data-sort="phone_numbers">Phone</th>
          <th data-sort="emails">Email</th>
          <th data-sort="website">Website</th>
          <th data-sort="professors_count">Professors</th>
          <th data-sort="professor_names">Professor Names</th>
          <th data-sort="professor_phones">Professor Phones</th>
          <th data-sort="professor_emails">Professor Emails</th>
        </tr>
      </thead>
      <tbody id="table-body"></tbody>
    </table>
    <div class="pagination" id="pagination"></div>
  </div>
</div>
<div id="copy-toast" class="copy-toast">Copied!</div>

<script>
// Dark mode logic
function toggleTheme() {
  document.body.classList.toggle('dark-mode');
  const isDark = document.body.classList.contains('dark-mode');
  localStorage.setItem('theme', isDark ? 'dark' : 'light');
  document.getElementById('theme-icon-dark').style.display = isDark ? 'none' : 'block';
  document.getElementById('theme-icon-light').style.display = isDark ? 'block' : 'none';
}

if (localStorage.getItem('theme') === 'dark' || (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
  document.body.classList.add('dark-mode');
  document.getElementById('theme-icon-dark').style.display = 'none';
  document.getElementById('theme-icon-light').style.display = 'block';
} else {
  document.getElementById('theme-icon-dark').style.display = 'block';
  document.getElementById('theme-icon-light').style.display = 'none';
}

const PAGE_SIZE = 25;
let colleges = [];
let filtered = [];
let currentPage = 1;
let sortKey = 'name';
let sortAsc = true;

async function init() {
  const res = await fetch('data/colleges.json');
  const data = await res.json();
  colleges = data.colleges;
  populateStates();
  populateDistricts('');
  applyFilters();
}

function populateStates() {
  const states = [...new Set(colleges.map(c => c.state))].sort();
  const sel = document.getElementById('state-filter');
  sel.innerHTML = '<option value="">All States</option>' +
    states.map(s => `<option value="${s}">${s}</option>`).join('');
  sel.value = '';
}

function populateDistricts(state) {
  const list = state
    ? colleges.filter(c => c.state === state)
    : colleges;
  const dists = [...new Set(list.map(c => c.district))].sort();
  const sel = document.getElementById('district-filter');
  sel.innerHTML = '<option value="">All Districts</option>' +
    dists.map(d => `<option value="${d}">${d}</option>`).join('');
}

function applyFilters() {
  const state = document.getElementById('state-filter').value;
  const district = document.getElementById('district-filter').value;
  const search = document.getElementById('search-input').value.toLowerCase().trim();
  const hasEmail = document.getElementById('has-email-filter').checked;

  filtered = colleges.filter(c => {
    if (state && c.state !== state) return false;
    if (district && c.district !== district) return false;
    if (search && !c.name.toLowerCase().includes(search)) return false;
    if (hasEmail && !c.emails) return false;
    return true;
  });

  sortData();
  currentPage = 1;
  render();
}

function sortData() {
  filtered.sort((a, b) => {
    let va, vb;
    if (sortKey === 'professors_count') {
      va = (a.professors || []).length;
      vb = (b.professors || []).length;
      return sortAsc ? va - vb : vb - va;
    }
    if (sortKey === 'professor_names') {
      va = (a.professors || []).map(p => p.name).join(', ').toLowerCase();
      vb = (b.professors || []).map(p => p.name).join(', ').toLowerCase();
    } else if (sortKey === 'professor_phones') {
      va = (a.professors || []).map(p => p.phone).join(', ').toLowerCase();
      vb = (b.professors || []).map(p => p.phone).join(', ').toLowerCase();
    } else if (sortKey === 'professor_emails') {
      va = (a.professors || []).map(p => p.email).join(', ').toLowerCase();
      vb = (b.professors || []).map(p => p.email).join(', ').toLowerCase();
    } else {
      va = (a[sortKey] || '').toLowerCase();
      vb = (b[sortKey] || '').toLowerCase();
    }
    return sortAsc ? va.localeCompare(vb) : vb.localeCompare(va);
  });
}

function render() {
  const totalPages = Math.ceil(filtered.length / PAGE_SIZE) || 1;
  const start = (currentPage - 1) * PAGE_SIZE;
  const page = filtered.slice(start, start + PAGE_SIZE);

  document.getElementById('result-count').innerHTML =
    `Showing <strong>${filtered.length}</strong> colleges`;

  const tbody = document.getElementById('table-body');
  if (!page.length) {
    tbody.innerHTML = '<tr><td colspan="11" style="text-align:center;padding:40px;color:#999;">No colleges found</td></tr>';
  } else {
    tbody.innerHTML = page.map(c => {
      const profs = c.professors || [];
      const names = profs.map(p => p.name).filter(Boolean);
      const pphones = profs.map(p => p.phone).filter(Boolean);
      const pemails = profs.map(p => p.email).filter(Boolean);

      const items = (val, cls) => {
        if (!val) return '<span class="empty">—</span>';
        const parts = val.split(/;\s*/).filter(Boolean);
        return parts.map(p => `<span class="item ${cls}" onclick="copyText(this)">${esc(p)}</span>`).join('');
      };
      const linkItems = (val) => {
        if (!val) return '<span class="empty">—</span>';
        const parts = val.split(/;\s*/).filter(Boolean);
        return parts.map(p => `<span class="item"><a href="${esc(p)}" target="_blank" rel="noopener">${esc(p.replace(/^https?:\/\//, ''))}</a></span>`).join('');
      };
      const listItems = (arr) => {
        if (!arr.length) return '<span class="empty">—</span>';
        return arr.map(p => `<span class="item">${esc(p)}</span>`).join('');
      };
      return `
      <tr>
        <td class="name-col">${esc(c.name)}</td>
        <td>${esc(c.city)}</td>
        <td>${esc(c.district)}</td>
        <td>${esc(c.pin_code)}</td>
        <td class="phone-col">${items(c.phone_numbers, 'phone-col')}</td>
        <td class="email-col">${items(c.emails, 'email-col')}</td>
        <td class="website-col">${linkItems(c.website)}</td>
        <td>${profs.length ? `<strong>${profs.length}</strong>` : '<span class="empty">—</span>'}</td>
        <td class="prof-col">${listItems(names)}</td>
        <td class="prof-col phone-col">${items(pphones.join('; '), 'phone-col')}</td>
        <td class="prof-col email-col">${items(pemails.join('; '), 'email-col')}</td>
      </tr>`;
    }).join('');
  }

  renderPagination(totalPages);
  document.getElementById('export-csv').disabled = filtered.length === 0;
  document.getElementById('export-excel').disabled = filtered.length === 0;
}

function renderPagination(totalPages) {
  const el = document.getElementById('pagination');
  if (totalPages <= 1) { el.innerHTML = ''; return; }

  let html = `<button ${currentPage <= 1 ? 'disabled' : ''} onclick="goPage(${currentPage - 1})">‹ Prev</button>`;
  let startP = Math.max(1, currentPage - 2);
  let endP = Math.min(totalPages, startP + 4);
  if (endP - startP < 4) startP = Math.max(1, endP - 4);
  if (startP > 1) html += '<button onclick="goPage(1)">1</button><button disabled>…</button>';
  for (let i = startP; i <= endP; i++)
    html += `<button class="${i === currentPage ? 'active' : ''}" onclick="goPage(${i})">${i}</button>`;
  if (endP < totalPages) html += '<button disabled>…</button><button onclick="goPage(' + totalPages + ')">' + totalPages + '</button>';
  html += `<button ${currentPage >= totalPages ? 'disabled' : ''} onclick="goPage(${currentPage + 1})">Next ›</button>`;
  html += `<span class="page-info">Page ${currentPage} of ${totalPages}</span>`;
  el.innerHTML = html;
}

function goPage(n) { currentPage = n; render(); }

function copyText(el) {
  const text = el.textContent.trim();
  navigator.clipboard.writeText(text).then(() => {
    const toast = document.getElementById('copy-toast');
    toast.textContent = `Copied: ${text}`;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 1500);
  }).catch(() => {});
}

function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function getExportData() {
  return filtered.map(c => {
    const profs = c.professors || [];
    return {
      'Name': c.name || '',
      'City': c.city || '',
      'District': c.district || '',
      'State': c.state || '',
      'Pin Code': c.pin_code || '',
      'Phone Numbers': c.phone_numbers || '',
      'Emails': c.emails || '',
      'Website': c.website || '',
      'Professor Count': profs.length || '',
      'Professor Names': profs.map(p => p.name).filter(Boolean).join(', '),
      'Professor Phones': profs.map(p => p.phone).filter(Boolean).join('; '),
      'Professor Emails': profs.map(p => p.email).filter(Boolean).join('; '),
    };
  });
}

function exportCSV() {
  const data = getExportData();
  if (!data.length) return;
  const headers = Object.keys(data[0]);
  const rows = data.map(r => headers.map(h => `"${(r[h]||'').replace(/"/g,'""')}"`).join(','));
  const csv = [headers.join(','), ...rows].join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'colleges.csv'; a.click();
  URL.revokeObjectURL(url);
}

function exportExcel() {
  const data = getExportData();
  if (!data.length) return;
  const ws = XLSX.utils.json_to_sheet(data);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Colleges');
  XLSX.writeFile(wb, 'colleges.xlsx');
}

document.getElementById('state-filter').addEventListener('change', function() {
  document.getElementById('district-filter').value = '';
  populateDistricts(this.value);
  applyFilters();
});
document.getElementById('district-filter').addEventListener('change', applyFilters);
document.getElementById('search-input').addEventListener('input', applyFilters);

document.querySelector('thead').addEventListener('click', function(e) {
  const th = e.target.closest('th');
  if (!th) return;
  const key = th.dataset.sort;
  if (!key) return;
  if (key === sortKey) sortAsc = !sortAsc;
  else { sortKey = key; sortAsc = true; }
  document.querySelectorAll('th .sort-icon').forEach(i => i.textContent = '');
  th.querySelector('.sort-icon').textContent = sortAsc ? '▲' : '▼';
  sortData();
  render();
});

init();
</script>
</body>
</html>
